<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1200"><stop stop-color="#FFF7DA"/><stop offset="1" stop-color="#FFFFFF"/></linearGradient>
    <style>
      .k{font-family:Helvetica,Arial,sans-serif}.l{font-size:22px;letter-spacing:.24em;text-transform:uppercase;fill:#737373;font-weight:700}.t{font-size:60px;letter-spacing:-.04em;fill:#0A0A0A;font-weight:700}.s{font-size:26px;fill:#6B7280}.m{animation:f 6s ease-in-out infinite}@keyframes f{0%,100%{opacity:.18}40%{opacity:1}}
    </style>
  </defs>
  <rect width="1600" height="1200" fill="url(#bg)"/>
  <rect x="430" y="240" width="740" height="720" fill="#FFF" stroke="#0A0A0A" stroke-opacity=".12" stroke-width="2"/>
  <text x="490" y="340" class="k l">Advisor Hub</text><text x="490" y="410" class="k t">Workspace</text><text x="490" y="462" class="k s">One place for live tools and insight</text>
  <rect class="m" x="500" y="530" width="250" height="130" fill="#F8FBFF" stroke="#8BB8FF" stroke-opacity=".55"/><text x="530" y="600" class="k l">Profiles</text>
  <rect class="m" x="850" y="530" width="250" height="130" fill="#FFFDF4" stroke="#D8C56E" stroke-opacity=".6" style="animation-delay:.6s"/><text x="880" y="600" class="k l">Backtests</text>
  <rect class="m" x="500" y="720" width="250" height="130" fill="#F8FFFD" stroke="#90D3C8" stroke-opacity=".65" style="animation-delay:1.2s"/><text x="530" y="790" class="k l">Alerts</text>
  <rect class="m" x="850" y="720" width="250" height="130" fill="#FCFAFF" stroke="#CDBDFF" stroke-opacity=".55" style="animation-delay:1.8s"/><text x="880" y="790" class="k l">AI + Voice</text>
  <circle cx="800" cy="690" r="14" fill="#0A0A0A"><animate attributeName="r" values="14;18;14" dur="3.8s" repeatCount="indefinite"/></circle>
</svg>
