<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEF4FF"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="lineGlow" x1="340" y1="0" x2="1260" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D6E4FF"/>
      <stop offset="0.5" stop-color="#B6D7FF"/>
      <stop offset="1" stop-color="#DDF3EF"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#DCE6F8" flood-opacity="0.85"/>
    </filter>
    <style>
      .label {
        font-family: Helvetica, Arial, sans-serif;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        fill: #737373;
        font-size: 24px;
        font-weight: 700;
      }
      .title {
        font-family: Helvetica, Arial, sans-serif;
        fill: #0A0A0A;
        font-size: 64px;
        font-weight: 700;
        letter-spacing: -0.04em;
      }
      .micro {
        font-family: Helvetica, Arial, sans-serif;
        fill: #6B7280;
        font-size: 28px;
        font-weight: 500;
      }
      .signalA { fill: #0A0A0A; }
      .signalB { fill: #8BB8FF; }
      .signalC { fill: #90D3C8; }
      .signalD { fill: #C2C2C2; }
      .pulse {
        animation: pulseDot 4s ease-in-out infinite;
        transform-origin: center;
      }
      .nodePulse {
        animation: nodeGlow 4s ease-in-out infinite;
        transform-origin: center;
      }
      @keyframes pulseDot {
        0%, 100% { opacity: 0.15; transform: scale(0.92); }
        25% { opacity: 1; transform: scale(1); }
        60% { opacity: 0.85; transform: scale(0.98); }
      }
      @keyframes nodeGlow {
        0%, 100% { opacity: 0.28; }
        35% { opacity: 0.75; }
        65% { opacity: 0.45; }
      }
    </style>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>
  <circle cx="1240" cy="180" r="240" fill="#F7FAFF"/>
  <circle cx="240" cy="980" r="280" fill="#F8FBFF"/>

  <path d="M340 600H1260" stroke="url(#lineGlow)" stroke-width="10" stroke-linecap="round"/>
  <path d="M340 600H1260" stroke="#0A0A0A" stroke-opacity="0.08" stroke-width="2" stroke-dasharray="10 20" stroke-linecap="round"/>

  <g filter="url(#softShadow)">
    <rect x="180" y="380" width="320" height="440" rx="0" fill="white" stroke="#0A0A0A" stroke-opacity="0.12" stroke-width="2"/>
    <rect x="640" y="330" width="320" height="540" rx="0" fill="white" stroke="#0A0A0A" stroke-opacity="0.12" stroke-width="2"/>
    <rect x="1100" y="380" width="320" height="440" rx="0" fill="white" stroke="#0A0A0A" stroke-opacity="0.12" stroke-width="2"/>
  </g>

  <rect x="206" y="412" width="92" height="10" fill="#0A0A0A"/>
  <rect x="206" y="438" width="58" height="10" fill="#CBD5E1"/>
  <text x="206" y="500" class="label">Profile</text>
  <text x="206" y="560" class="title">Traits</text>
  <text x="206" y="616" class="micro">Behavioral profile</text>

  <rect x="666" y="362" width="92" height="10" fill="#0A0A0A"/>
  <rect x="666" y="388" width="58" height="10" fill="#CBD5E1"/>
  <text x="666" y="450" class="label">Pulse</text>
  <text x="666" y="510" class="title">Map</text>
  <text x="666" y="566" class="micro">Clean workflow layer</text>

  <rect x="1126" y="412" width="92" height="10" fill="#0A0A0A"/>
  <rect x="1126" y="438" width="58" height="10" fill="#CBD5E1"/>
  <text x="1126" y="500" class="label">CRM</text>
  <text x="1126" y="560" class="title">Use</text>
  <text x="1126" y="616" class="micro">Advisor-ready actions</text>

  <g class="nodePulse">
    <rect x="710" y="640" width="180" height="96" fill="#F7FBFF" stroke="#8BB8FF" stroke-opacity="0.5"/>
    <rect x="736" y="668" width="74" height="8" fill="#0A0A0A"/>
    <rect x="736" y="692" width="116" height="8" fill="#8BB8FF"/>
  </g>

  <g opacity="0.95">
    <circle class="signalA pulse" cx="260" cy="680" r="13">
      <animate attributeName="cx" values="260;800;1180;260" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="680;680;680;680" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle class="signalB pulse" cx="300" cy="720" r="13" style="animation-delay:0.4s">
      <animate attributeName="cx" values="300;760;1220;300" dur="6s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="720;720;720;720" dur="6s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle class="signalC pulse" cx="340" cy="760" r="13" style="animation-delay:0.8s">
      <animate attributeName="cx" values="340;840;1260;340" dur="6s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="760;760;760;760" dur="6s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle class="signalD pulse" cx="260" cy="760" r="13" style="animation-delay:1.1s">
      <animate attributeName="cx" values="260;720;1160;260" dur="6s" begin="1.8s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="760;760;760;760" dur="6s" begin="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g opacity="0.85">
    <rect x="1174" y="684" width="178" height="86" fill="#FCFEFF" stroke="#0A0A0A" stroke-opacity="0.12"/>
    <text x="1200" y="716" class="label">Live</text>
    <text x="1200" y="766" class="micro">Mapped into workflow</text>
  </g>
</svg>
